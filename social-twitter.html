<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Twitter Directory | Glug Names</title>
  <link rel="stylesheet" href="./site.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <nav class="top-nav" aria-label="Primary">
        <a class="brand" href="./index.html"><span class="brand-mark" aria-hidden="true"></span>Glug Names</a>
        <div class="nav-links">
          <a class="nav-link" href="./index.html">Stock</a>
          <a class="nav-link" href="./contact.html">Contact Me</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <span class="eyebrow">Platform Directory</span>
        <h1>Twitter Names</h1>
        <p>Complete listing for the Twitter set.</p>
        <div class="stat-grid stat-grid-3">
          <article class="stat">
            <div class="stat-value">4</div>
            <div class="stat-label">Entries</div>
          </article>
          <article class="stat">
            <div class="stat-value">1</div>
            <div class="stat-label">Contributors</div>
          </article>
          <article class="stat">
            <div class="stat-value"><img class="platform-icon" src="https://cdn.simpleicons.org/x/cfd8ee" alt="Twitter icon" loading="lazy"></div>
            <div class="stat-label">Platform</div>
          </article>
        </div>
      </section>

      <section class="directory-panel">
        <div class="panel-top">
          <div>
            <h2 class="panel-title">Listed Names</h2>
            <p class="panel-subtitle">Readable directory format for quick scanning.</p>
          </div>
        </div>
        <ul class="directory-list">
          
          <li class="directory-item"><span class="item-name">cramorant</span><span class="item-meta">Karl</span></li>
          <li class="directory-item"><span class="item-name">rolycoly</span><span class="item-meta">Karl</span></li>
          <li class="directory-item"><span class="item-name">runerigus</span><span class="item-meta">Karl</span></li>
          <li class="directory-item"><span class="item-name">formantis</span><span class="item-meta">Karl</span></li>
        
        </ul>
      </section>
    </main>
  </div>
</body>
</html>
