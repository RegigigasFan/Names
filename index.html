<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock | Glug Names</title>
  <link rel="stylesheet" href="./site.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <nav class="top-nav" aria-label="Primary">
        <a class="brand" href="./index.html"><span class="brand-mark" aria-hidden="true"></span>Glug Names</a>
        <div class="nav-links">
          <a class="nav-link active" href="./index.html">Stock</a>
          <a class="nav-link" href="./contact.html">Contact Me</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <span class="eyebrow">Inventory Browser</span>
        <h1>Premium Handle Stock</h1>
        <p>Browse by platform and open each directory page to review listed names in a clean, structured format.</p>
        <div class="stat-grid stat-grid-3">
          <article class="stat">
            <div class="stat-value" data-catalog-total>14</div>
            <div class="stat-label">Different Platforms</div>
          </article>
          <article class="stat">
            <div class="stat-value">459</div>
            <div class="stat-label">Total Names</div>
          </article>
          <article class="stat">
            <div class="stat-value">2</div>
            <div class="stat-label">Contributors</div>
          </article>
        </div>
      </section>

      <section class="stock-panel">
        <div class="panel-top">
          <div>
            <h2 class="panel-title">Directory Listings</h2>
            <p class="panel-subtitle">Select a platform to open its full list.</p>
          </div>
        </div>

        <div class="product-grid" data-store-grid></div>
      </section>
    </main>
  </div>

  <script src="./store.js"></script>
</body>
</html>
