<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Social Listings</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --soft: #5b6474;
      --line: #d8dde7;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      width: min(860px, 92vw);
      margin: 36px auto;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3vw, 2rem);
    }

    p {
      margin: 0 0 18px;
      color: var(--soft);
    }

    ul {
      margin: 0;
      padding-left: 18px;
      columns: 2;
      column-gap: 28px;
    }

    li {
      break-inside: avoid;
      margin-bottom: 10px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      main {
        margin: 20px auto;
        padding: 16px;
      }

      ul {
        columns: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Social Listings</h1>
    <p>Select a page below to open its entries.</p>
    <ul>
      <li><a href="./social-discord.html">Discord</a></li>
      <li><a href="./social-email.html">Email</a></li>
      <li><a href="./social-instagram.html">Instagram</a></li>
      <li><a href="./social-kick.html">Kick</a></li>
      <li><a href="./social-linktree.html">Linktree</a></li>
      <li><a href="./social-pastebin.html">Pastebin</a></li>
      <li><a href="./social-pinterest.html">Pinterest</a></li>
      <li><a href="./social-snapchat.html">Snapchat</a></li>
      <li><a href="./social-solo-to.html">solo.to</a></li>
      <li><a href="./social-soundcloud.html">SoundCloud</a></li>
      <li><a href="./social-tiktok.html">TikTok</a></li>
      <li><a href="./social-twitch.html">Twitch</a></li>
      <li><a href="./social-twitter.html">Twitter</a></li>
      <li><a href="./social-youtube.html">YouTube</a></li>
    </ul>
  </main>
</body>
</html>
